      transition: 0.1s;

    .tap:active {
      transform: scale(0.98);
    }

    .reset {
      width: 60%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 18px;

      color: white;
      margin-bottom: 15px;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Naam Jaap Counter</h1>

  <div class="count" id="count">0</div>
  <div class="mala" id="mala">Maalas: 0</div>

  <button class="tap" onclick="increment()">TAP</button>

  <button class="reset" onclick="resetCounter()">Reset</button>
</div>

<script>
let count = localStorage.getItem('count') ? parseInt(localStorage.getItem('count')) : 0;
let mala = Math.floor(count / 108);
updateDisplay();

function increment(){
  count++;
  mala = Math.floor(count / 108);
  localStorage.setItem('count', count);
  updateDisplay();
}

function resetCounter(){
  count = 0;
  mala = 0;
  localStorage.setItem('count', count);
  updateDisplay();
}

function updateDisplay(){
  document.getElementById('count').innerText = count % 108;
  document.getElementById('mala').innerText = 'Maalas: ' + mala;
}
</script>

</body>
</html>
