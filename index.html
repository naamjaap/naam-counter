  <title>Mala Counter</title>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff3e0, #ffe0b2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      box-sizing: border-box;

    h1 {
      color: #d35400;

      margin-bottom: 10px;
    }

    .count {
      font-size: 55px;
      font-weight: bold;
      color: #2c3e50;
      margin: 10px 0;
    }

    .mala {
      font-size: 20px;
      color: #8e44ad;
      margin-bottom: 15px;
    }

    /* BIG BUT NOT FULL SCREEN BUTTON */
    .tap {
      width: 100%;
      height: 220px;

      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .tap:active {
      transform: scale(0.98);
    }

    .reset {
