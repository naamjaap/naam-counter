<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mala Counter</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #0a192f;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.container {
width: 100%;
max-width: 420px;
padding: 20px;
box-sizing: border-box;
text-align: center;
}

h1 {
color: #87CEEB;
font-size: 24px;
margin-bottom: 15px;
}

.count {
font-size: 85px;
font-weight: bold;
color: white;
}

/* ✅ UPDATED STATS ROW STYLE */
.stats-row {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 15px;
gap: 10px;
}

.mala {
flex: 1;
font-size: 17px; /* ⬆ slightly bigger */
color: #87CEFA; /* 💙 light sky blue */
font-weight: 500;
text-align: center;
}

.tap {
width: 100%;
height: 220px;
border-radius: 20px;
border: none;
background: #27ae60;
color: white;
font-size: 36px;
font-weight: bold;
cursor: pointer;
}

.tap:active {
transform: scale(0.98);
}

.reset {
margin-top: 10px;
width: 100%;
padding: 12px;
border: none;
border-radius: 12px;
font-size: 16px;
background: #e74c3c;
color: white;
cursor: pointer;
}

.history {
margin-top: 20px;
text-align: left;
background: rgba(255,255,255,0.6);
padding: 10px;
border-radius: 10px;
max-height: 200px;
overflow-y: auto;
}

.history h3 {
margin: 0 0 10px 0;
font-size: 16px;
}

.history-item {
font-size: 14px;
margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Naam Jaap Counter</h1>

<div class="count" id="count">0</div>

<div class="stats-row">
<div class="mala" id="mala">Maalas: 0</div>
<div class="mala" id="timer">Current: 00:00</div>
<div class="mala" id="totalTime">Total: 00:00</div>
</div>

<button class="tap" onclick="increment()">TAP</button>
<button class="reset" onclick="resetCounter()">Reset</button>

<div class="history">
<h3>Daily History</h3>
<div id="historyList"></div>

<button class="reset" onclick="resetAllTime()" style="margin-top:10px;">
Reset All Time
</button>
</div>

</div>

<script>

let count = localStorage.getItem('count') ? parseInt(localStorage.getItem('count')) : 0;
let mala = Math.floor(count / 108);
let lastSavedMala = mala;

let history = JSON.parse(localStorage.getItem('history') || '[]');
let totalSeconds = localStorage.getItem('totalSeconds') ? parseInt(localStorage.getItem('totalSeconds')) : 0;

let malaStartTime = null;
let sessionStart = Date.now();
let timerInterval = null;

updateDisplay();
renderHistory();

function increment() {

if(count % 108 === 0){
malaStartTime = Date.now();
sessionStart = Date.now();
startTimer();
}

count++;
let newMala = Math.floor(count / 108);

if(newMala > lastSavedMala){

stopTimer();

let secondsTaken = Math.floor((Date.now() - malaStartTime) / 1000);
if(isNaN(secondsTaken)) secondsTaken = 0;

totalSeconds += secondsTaken;
localStorage.setItem('totalSeconds', totalSeconds);

saveMalaEntry(1, secondsTaken);

if(navigator.vibrate){
navigator.vibrate(200);
}

lastSavedMala = newMala;
}

mala = newMala;
localStorage.setItem('count', count);
updateDisplay();
}

function startTimer(){
clearInterval(timerInterval);

timerInterval = setInterval(() => {

let currentSeconds = Math.floor((Date.now() - malaStartTime) / 1000);
document.getElementById('timer').innerText =
'Current: ' + formatTime(currentSeconds);

let liveTotal = totalSeconds + Math.floor((Date.now() - sessionStart) / 1000);

document.getElementById('totalTime').innerText =
'Total: ' + formatTime(liveTotal);

}, 1000);
}

function stopTimer(){
clearInterval(timerInterval);
}

function resetCounter(){
count = 0;
mala = 0;
lastSavedMala = 0;

stopTimer();

localStorage.setItem('count', count);

document.getElementById('timer').innerText = 'Current: 00:00';

updateDisplay();
}

function resetAllTime(){

if(!confirm("Reset EVERYTHING (history + time)?")) return;

history = [];
totalSeconds = 0;
count = 0;
mala = 0;
lastSavedMala = 0;

localStorage.removeItem('history');
localStorage.removeItem('totalSeconds');
localStorage.removeItem('count');

stopTimer();

updateDisplay();
renderHistory();
}

function saveMalaEntry(malasDone, secondsTaken){

const today = new Date().toLocaleDateString();

let existing = history.find(h => h.date === today);

if(existing){
existing.malas += malasDone;
existing.seconds += secondsTaken;
} else {
history.push({
date: today,
malas: malasDone,
seconds: secondsTaken
});
}

localStorage.setItem('history', JSON.stringify(history));
renderHistory();
}

function renderHistory(){

const list = document.getElementById('historyList');
list.innerHTML = '';

history.slice().reverse().forEach(item => {

let secs = item.seconds;
if(isNaN(secs)) secs = 0;

let div = document.createElement('div');
div.className = 'history-item';

div.innerText =
item.date +
' : ' +
item.malas +
' mala(s) | Total Time: ' +
formatTime(secs);

list.appendChild(div);
});
}

function formatTime(seconds){

if(isNaN(seconds)) return "00:00";

let mins = Math.floor(seconds / 60);
let secs = seconds % 60;

return String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
}

function updateDisplay(){
document.getElementById('count').innerText = count % 108;
document.getElementById('mala').innerText = 'Maalas: ' + mala;
}

</script>

</body>
</html>
