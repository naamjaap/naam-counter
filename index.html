<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mala Counter</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff3e0, #ffe0b2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    h1 {
      color: #d35400;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .count {
      font-size: 55px;
      font-weight: bold;
      color: #2c3e50;
      margin: 10px 0;
    }

    .mala {
      font-size: 20px;
      color: #8e44ad;
      margin-bottom: 15px;
    }

    /* BIG BUT NOT FULL SCREEN BUTTON */
    .tap {
      width: 100%;
      height: 220px;
      border-radius: 20px;
      border: none;
      background: #27ae60;
      color: white;
      font-size: 36px;
      font-weight: bold;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .tap:active {
      transform: scale(0.98);
    }

    .reset {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: #e74c3c;
      color: white;
    }

    .history {
      margin-top: 20px;
      text-align: left;
      background: rgba(255,255,255,0.6);
      padding: 10px;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #333;
    }

    .history-item {
      font-size: 14px;
      margin-bottom: 5px;
      color: #444;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Naam Jaap Counter</h1>

  <div class="count" id="count">0</div>
  <div class="mala" id="mala">Maalas: 0</div>

  <button class="tap" onclick="increment()">TAP</button>

  <button class="reset" onclick="resetCounter()">Reset</button>

  <div class="history">
    <h3>Daily History</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
let count = localStorage.getItem('count') ? parseInt(localStorage.getItem('count')) : 0;
let mala = Math.floor(count / 108);
let lastSavedMala = mala;
let history = JSON.parse(localStorage.getItem('history') || '[]');

updateDisplay();
renderHistory();

function increment(){
  count++;
  let newMala = Math.floor(count / 108);

  // vibration ONLY when new mala completed
  if(newMala > lastSavedMala){
    if(navigator.vibrate){
      navigator.vibrate(200);
    }
    saveMalaEntry(newMala - lastSavedMala);
    lastSavedMala = newMala;
  }

  mala = newMala;
  localStorage.setItem('count', count);
  updateDisplay();
}

function resetCounter(){
  count = 0;
  mala = 0;
  lastSavedMala = 0;
  localStorage.setItem('count', count);
  updateDisplay();
}

function saveMalaEntry(malasDone){
  const today = new Date().toLocaleDateString();

  let existing = history.find(h => h.date === today);

  if(existing){
    existing.malas += malasDone;
  } else {
    history.push({date: today, malas: malasDone});
  }

  localStorage.setItem('history', JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '';

  history.slice().reverse().forEach(item => {
    let div = document.createElement('div');
    div.className = 'history-item';
    div.innerText = item.date + ' : ' + item.malas + ' maalas';
    list.appendChild(div);
  });
}

function updateDisplay(){
  document.getElementById('count').innerText = count % 108;
  document.getElementById('mala').innerText = 'Maalas: ' + mala;
}
</script>

</body>
</html>
